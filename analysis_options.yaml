# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs. The analyzer can also be invoked from the command line by running
# `flutter analyze`.

include: package:flutter_lints/flutter.yaml

analyzer:
  # Exclude generated and build files from analysis
  exclude:
    - "**/.dart_tool/**"
    - "**/build/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "firmware/**"

  # Treat specific issues as errors or warnings
  errors:
    missing_return: error
    dead_code: warning
    unused_import: warning
    unused_local_variable: warning
    todo: ignore

linter:
  rules:
    # -- Style --
    prefer_single_quotes: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_locals: true
    avoid_print: false          # We use debugPrint, but allow print during dev
    sort_constructors_first: true
    use_key_in_widget_constructors: true

    # -- Safety --
    avoid_dynamic_calls: true
    cancel_subscriptions: true
    close_sinks: true

    # -- Readability --
    always_declare_return_types: true
    curly_braces_in_flow_control_structures: true
    prefer_is_empty: true
    unnecessary_this: true
